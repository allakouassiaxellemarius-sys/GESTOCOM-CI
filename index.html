<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="GESTOCOM CI - Logiciel de gestion commerciale pour les PME ivoiriennes. Données 100% locales, fonctionne hors ligne. Stock, ventes, dépenses, comptabilité OHADA." />
    <meta name="theme-color" content="#1e40af" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://vercel.com https://*.vercel.app; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GESTOCOM CI" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <title>GESTOCOM CI - Gestion Commerciale Professionnelle</title>
    <style>
      #splash { position: fixed; inset: 0; z-index: 9999; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease-out; }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .splash-icon { width: 100px; height: 100px; animation: splashFadeIn 1s ease-out; filter: drop-shadow(0 0 20px rgba(255,140,0,0.3)); }
      #splash .splash-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 4px; margin-top: 16px; opacity: 0; animation: splashFadeIn 0.8s ease-out 0.3s forwards; }
      #splash .splash-subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 400; color: #FF8C00; letter-spacing: 6px; margin-top: 4px; opacity: 0; animation: splashFadeIn 0.8s ease-out 0.5s forwards; }
      #splash .splash-line { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, #FF8C00, transparent); margin-top: 16px; opacity: 0; animation: splashFadeIn 0.6s ease-out 0.7s forwards; }
      #splash .splash-dots { display: flex; gap: 6px; margin-top: 24px; opacity: 0; animation: splashFadeIn 0.6s ease-out 0.9s forwards; }
      #splash .splash-dots span { width: 5px; height: 5px; border-radius: 50%; background: #FF8C00; animation: splashPulse 1.2s ease-in-out infinite; }
      #splash .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashFadeIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
      @keyframes splashPulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg class="splash-icon" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gO" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FF6B00"/></linearGradient>
          <linearGradient id="gV" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2E8B57"/><stop offset="100%" stop-color="#1A6B3C"/></linearGradient>
        </defs>
        <g transform="translate(200,200)">
          <rect x="-70" y="10" width="28" height="55" rx="6" fill="url(#gV)" opacity="0.85"/>
          <rect x="-21" y="-20" width="28" height="85" rx="6" fill="url(#gO)" opacity="0.9"/>
          <rect x="28" y="-55" width="28" height="120" rx="6" fill="url(#gV)" opacity="0.95"/>
          <path d="M -58 -5 Q 0 -50 42 -68" fill="none" stroke="url(#gO)" stroke-width="4" stroke-linecap="round"/>
          <polygon points="42,-68 30,-58 38,-52" fill="#FF6B00"/>
          <polygon points="42,-68 32,-65 38,-52" fill="#FF8C00"/>
          <circle cx="-58" cy="-5" r="4" fill="#FF8C00"/>
          <circle cx="0" cy="-50" r="4" fill="#FF8C00"/>
          <circle cx="42" cy="-68" r="5" fill="#FF6B00"/>
        </g>
      </svg>
      <div class="splash-title">GESTOCOM</div>
      <div class="splash-subtitle">CI</div>
      <div class="splash-line"></div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('splash');
          if (el) { el.classList.add('hide'); setTimeout(function() { el.remove(); }, 600); }
        }, 1500);
      });
    </script>
  </body>
</html>
