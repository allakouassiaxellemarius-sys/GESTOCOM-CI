<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Box / Package icon -->
  <rect x="120" y="140" width="272" height="232" rx="12" fill="white" opacity="0.95"/>
  <rect x="120" y="140" width="272" height="60" rx="12" fill="url(#accent)"/>
  <rect x="120" y="188" width="272" height="12" fill="url(#accent)"/>
  <!-- Vertical tape -->
  <rect x="230" y="140" width="52" height="232" fill="rgba(255,255,255,0.3)"/>
  <!-- GCI letters -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="72" fill="#1a73e8" letter-spacing="-2">GCI</text>
  <!-- Bottom bar -->
  <rect x="80" y="420" width="352" height="8" rx="4" fill="url(#accent)" opacity="0.8"/>
  <!-- Version dot -->
  <circle cx="256" cy="460" r="6" fill="white" opacity="0.6"/>
</svg>
