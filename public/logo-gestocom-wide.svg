<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <linearGradient id="gradVert" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57"/>
      <stop offset="100%" style="stop-color:#1A6B3C"/>
    </linearGradient>
  </defs>
  
  <!-- Icône graphique (côté gauche) -->
  <g transform="translate(80, 85)">
    <rect x="-50" y="5" width="22" height="45" rx="5" fill="url(#gradVert)" opacity="0.85"/>
    <rect x="-22" y="-15" width="22" height="65" rx="5" fill="url(#gradOrange)" opacity="0.9"/>
    <rect x="6" y="-42" width="22" height="92" rx="5" fill="url(#gradVert)" opacity="0.95"/>
    <path d="M -40 -2 Q 0 -38 17 -52" fill="none" stroke="#FF6B00" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="17,-52 12,-44 15,-42" fill="#FF6B00"/>
    <circle cx="-40" cy="-2" r="3.5" fill="#FF8C00"/>
    <circle cx="0" cy="-38" r="3.5" fill="#FF8C00"/>
    <circle cx="17" cy="-52" r="4" fill="#FF6B00"/>
  </g>

  <!-- Texte (côté droit) -->
  <text x="150" y="72" 
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="56" font-weight="700" 
        fill="#1A1A2E" letter-spacing="2">GESTOCOM</text>
  
  <text x="150" y="108" 
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="34" font-weight="300" 
        fill="#FF8C00" letter-spacing="10">CI</text>

  <line x1="150" y1="118" x2="330" y2="118" 
        stroke="url(#gradOrange)" stroke-width="2" stroke-linecap="round"/>

  <text x="150" y="142" 
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" 
        font-size="13" font-weight="400" 
        fill="#666666" letter-spacing="3">GESTION COMMERCIALE INTELLIGENTE</text>
</svg>
