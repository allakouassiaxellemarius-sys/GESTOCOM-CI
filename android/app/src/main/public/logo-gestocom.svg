<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Dégradé principal orange -->
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <!-- Dégradé vert -->
    <linearGradient id="gradVert" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57"/>
      <stop offset="100%" style="stop-color:#1A6B3C"/>
    </linearGradient>
    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
    <!-- Lueur orange -->
    <filter id="glowOrange">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond transparent (rien ici) -->

  <!-- ═══════════════════════════════════════ -->
  <!-- ICÔNE PRINCIPALE : Graphique Ascendant -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(200, 175)" filter="url(#shadow)">
    
    <!-- Cercle de fond subtil -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FF8C0015" stroke-width="1"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#FF8C0008" stroke-width="1"/>

    <!-- Barres du graphique (3 barres croissantes) -->
    <!-- Barre 1 - gauche (la plus petite) -->
    <rect x="-70" y="10" width="28" height="55" rx="6" fill="url(#gradVert)" opacity="0.85"/>
    <rect x="-70" y="10" width="28" height="12" rx="6" fill="#3CB371" opacity="0.6"/>
    
    <!-- Barre 2 - centre -->
    <rect x="-21" y="-20" width="28" height="85" rx="6" fill="url(#gradOrange)" opacity="0.9"/>
    <rect x="-21" y="-20" width="28" height="12" rx="6" fill="#FFA500" opacity="0.6"/>
    
    <!-- Barre 3 - droite (la plus haute) -->
    <rect x="28" y="-55" width="28" height="120" rx="6" fill="url(#gradVert)" opacity="0.95"/>
    <rect x="28" y="-55" width="28" height="12" rx="6" fill="#3CB371" opacity="0.6"/>

    <!-- Flèche ascendante (traitement de la performance) -->
    <g filter="url(#glowOrange)">
      <!-- Ligne de tendance -->
      <path d="M -58 -5 Q 0 -50 42 -68" 
            fill="none" 
            stroke="url(#gradOrange)" 
            stroke-width="4" 
            stroke-linecap="round"
            stroke-dasharray="0"/>
      
      <!-- Pointe de flèche -->
      <polygon points="42,-68 30,-58 38,-52" fill="#FF6B00"/>
      <polygon points="42,-68 32,-65 38,-52" fill="#FF8C00"/>
    </g>

    <!--Petits points de données sur la ligne -->
    <circle cx="-58" cy="-5" r="4" fill="#FF8C00"/>
    <circle cx="0" cy="-50" r="4" fill="#FF8C00"/>
    <circle cx="42" cy="-68" r="5" fill="#FF6B00"/>

  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- TEXTE : NOM DU LOGICIEL -->
  <!-- ═══════════════════════════════════════ -->
  
  <!-- GESTOCOM -->
  <text x="200" y="310" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="48" 
        font-weight="700" 
        text-anchor="middle" 
        fill="#1A1A2E" 
        letter-spacing="3">
    GESTOCOM
  </text>
  
  <!-- CI avec accent -->
  <text x="200" y="350" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="28" 
        font-weight="300" 
        text-anchor="middle" 
        fill="#FF8C00" 
        letter-spacing="8">
    CI
  </text>

  <!-- Ligne décorative sous le texte -->
  <line x1="140" y1="360" x2="260" y2="360" 
        stroke="url(#gradOrange)" 
        stroke-width="2" 
        stroke-linecap="round"/>

  <!-- Sous-titre -->
  <text x="200" y="380" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="11" 
        font-weight="400" 
        text-anchor="middle" 
        fill="#666666" 
        letter-spacing="2">
    GESTION COMMERCIALE INTELLIGENTE
  </text>

</svg>
