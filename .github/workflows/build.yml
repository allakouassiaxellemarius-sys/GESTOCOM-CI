name: Build & Release GESTOCOM CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - win
          - mac
          - linux
          - android
          - ios

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ─── Desktop: Windows ───
  build-windows:
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'win'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build Windows installers
        run: npx electron-builder --win --config
        env:
          CSC_LINK: ${{ secrets.WIN_CERT_PFX_PATH }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CERT_PFX_PATH }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
            release/*.msi
          retention-days: 30

  # ─── Desktop: macOS ───
  build-macos:
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'mac'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build macOS installers
        run: npx electron-builder --mac --config
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_PATH }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            release/*.dmg
            release/*.pkg
          retention-days: 30

  # ─── Desktop: Linux ───
  build-linux:
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'linux'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools
      - name: Build Linux installers
        run: npx electron-builder --linux --config
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
          retention-days: 30

  # ─── Android ───
  build-android:
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'android'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '${{ env.JAVA_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Setup Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Build AAB (release)
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-installers
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ─── iOS ───
  build-ios:
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'ios'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Setup Capacitor iOS
        run: |
          npx cap add ios || true
          npx cap sync ios
      - name: Build iOS Archive
        working-directory: ios
        run: |
          xcodebuild -workspace GESTOCOMCI.xcworkspace \
            -scheme GESTOCOMCI \
            -configuration Release \
            -archivePath build/GESTOCOMCI.xcarchive \
            -allowProvisioningUpdates \
            archive
      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/GESTOCOMCI.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ \
            -allowProvisioningUpdates
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: ios-installers
          path: ios/build/*.ipa
          retention-days: 30

  # ─── Release ───
  release:
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Generate checksums
        run: |
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.apk" -o -name "*.aab" -o -name "*.ipa" \) -exec sha256sum {} \; > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.pkg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
